name: metrix_plugin
description: Metrix SDK flutter plugin.
version: 1.1.1
homepage: https://metrix.ir

environment:
  sdk: ">=2.7.0 <3.0.0"
  flutter: ">=1.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: ir.metrix.flutter
        pluginClass: Metrix
      ios:
        pluginClass: Metrix